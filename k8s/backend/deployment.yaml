apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-deployment
spec:
  replicas: 2 # Start with 2 pods per node? Actually, this is total pods.
  selector:
    matchLabels:
      app: ai-platform
  template:
    metadata:
      labels:
        app: ai-platform
    spec:
      containers:
      - name: ai-container
        image: your-dockerhub-username/ai-platform:v1
        imagePullPolicy: Always
        env:
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: mongo-db-creds
              key: MONGO_URL
        - name: PROCESSOR_URL
          value: "http://data-processor-service" # Internal K8s DNS
        resources:
          requests:
            cpu: "50m"    # Minimum CPU needed
            memory: "64Mi"
          limits:
            cpu: "200m"   # Maximum allowed
            memory: "256Mi"